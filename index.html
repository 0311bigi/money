<body class="bg-stone-50 text-stone-800 text-base">
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc, query, where, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        window.FirebaseSDK = { initializeApp, getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, updateDoc, setDoc, query, where, writeBatch, getDoc, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut };
        window.isFirebaseSDKReady = true;
    </script>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const Icon = ({ name, size = 24, className = "" }) => {
        const ref = useRef(null);
        useEffect(() => { if (window.lucide && ref.current) { const i = document.createElement('i'); i.setAttribute('data-lucide', name); ref.current.innerHTML = ''; ref.current.appendChild(i); window.lucide.createIcons({ root: ref.current, attrs: { width: String(size), height: String(size), class: className } }); } }, [name, size, className]);
        return <span ref={ref} style={{ display: 'inline-flex', verticalAlign: 'middle' }}></span>;
    };

    const getLocalToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const getLocalMonth = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
    const addMonths = (dStr, m) => { const [y,M,d]=dStr.split('-').map(Number); const nd=new Date(y,M-1+m,1); if(m>0) return `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-01`; const maxD=new Date(nd.getFullYear(),nd.getMonth()+1,0).getDate(); return `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(Math.min(d,maxD)).padStart(2,'0')}`; };
    const getDayOfWeek = (dateStr) => { const days = ['週日', '週一', '週二', '週三', '週四', '週五', '週六']; return days[new Date(dateStr).getDay()]; };

    const DEFAULT_CATS = { expense: [{name:'飲食',icon:'utensils',subs:[]},{name:'交通',icon:'bus',subs:[]},{name:'購物',icon:'shopping-bag',subs:[]},{name:'娛樂',icon:'film',subs:[]},{name:'居住',icon:'home',subs:[]}], income: [{name:'薪資',icon:'wallet',subs:[]},{name:'獎金',icon:'gift',subs:[]},{name:'投資',icon:'trending-up',subs:[]}] };
    
    const ACCOUNT_TYPES = { 
        'cash': { label: '現金', iconName: 'coins', color: 'text-emerald-600 bg-emerald-50' },
        'bank': { label: '銀行', iconName: 'landmark', color: 'text-blue-600 bg-blue-50' },
        'credit': { label: '信用卡', iconName: 'credit-card', color: 'text-purple-600 bg-purple-50' },
        'electronic': { label: '電子貨幣', iconName: 'smartphone-nfc', color: 'text-sky-600 bg-sky-50' },
        'invest': { label: '投資理財', iconName: 'trending-up', color: 'text-rose-600 bg-rose-50' },
        'payable': { label: '應付帳款', iconName: 'file-minus', color: 'text-orange-600 bg-orange-50' },
        'receivable': { label: '應收帳款', iconName: 'file-plus', color: 'text-teal-600 bg-teal-50' },
        'other': { label: '其它', iconName: 'wallet', color: 'text-stone-600 bg-stone-100' }
    };

    const CURRENCIES = ['TWD','USD','JPY','EUR','CNY','HKD','KRW','AUD','CAD','GBP','SGD','CHF'];
    const DEFAULT_RATES = {'TWD':1,'USD':32.5,'JPY':0.22,'EUR':35.0,'CNY':4.5,'HKD':4.1,'KRW':0.024,'AUD':21.5,'CAD':24.0,'GBP':41.0,'SGD':24.2,'CHF':36.5};
    
    const CATEGORY_COLORS = { '飲食': '#0ea5e9', '交通': '#22c55e', '購物': '#eab308', '娛樂': '#a855f7', '居住': '#f97316', '醫療': '#ef4444', '教育': '#6366f1', '薪資': '#10b981', '獎金': '#f59e0b', '投資': '#f43f5e', '轉帳': '#64748b', '代墊': '#8b5cf6', '還款': '#14b8a6', '自動繳款': '#94a3b8', '運動': '#84cc16' };
    const FALLBACK_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];

    const AVAILABLE_ICONS = ['utensils', 'coffee', 'beer', 'shopping-cart', 'shopping-bag', 'gift', 'bus', 'car', 'plane', 'bed', 'map', 'home', 'zap', 'wifi', 'phone', 'hammer', 'film', 'gamepad-2', 'music', 'camera', 'ticket', 'stethoscope', 'pill', 'heart', 'graduation-cap', 'book', 'briefcase', 'smile', 'frown', 'star', 'tag', 'dumbbell', 'more-horizontal'];
    
    const OFFSET_ACCOUNT_ID = 'virtual-offset-account';

    const NavBtn = ({icon, label, active, onClick}) => (
        <button onClick={onClick} className={`flex flex-col items-center justify-center w-full gap-1 ${active?'text-rose-600 scale-105':'text-stone-400 hover:text-stone-600'}`}>{icon}<span className="text-xs font-bold">{label}</span></button>
    );

    const Header = ({ currentBook, setIsBookSelectOpen, user, handleGoogleLogin, title }) => (
        <header className="sticky top-0 z-20 bg-white border-b border-stone-100 px-6 py-4 flex justify-between items-center shadow-sm">
            <div className="flex items-center gap-3 cursor-pointer p-2 hover:bg-stone-50 rounded-xl" onClick={() => !title && setIsBookSelectOpen(true)}>
                <div className="bg-rose-500 p-2.5 rounded-xl text-white shadow-md shadow-rose-200"><Icon name={title ? 'landmark' : (currentBook.id==='main'?'book':'plane')} size={24}/></div>
                <div><h1 className="font-bold text-lg text-stone-700 tracking-wide flex items-center gap-1.5">{title || currentBook.name} {!title && <Icon name="chevron-down" size={18} className="text-stone-400"/>}</h1></div>
            </div>
            {user?.isAnonymous ? <button onClick={handleGoogleLogin} className="text-sm font-bold text-rose-600 bg-rose-50 px-3 py-2 rounded-lg">登入</button> : <div className="h-9 w-9 rounded-full overflow-hidden border border-stone-200"><img src={user?.photoURL||'https://via.placeholder.com/32'} alt="User"/></div>}
        </header>
    );

    const safeNum = (val) => {
        if (val === null || val === undefined) return "0";
        const num = parseFloat(val);
        return isNaN(num) ? "0" : num.toLocaleString();
    };

    function App() {
        const [sdkReady, setSdkReady] = useState(false);
        const [needConfig, setNeedConfig] = useState(false);
        const [configInput, setConfigInput] = useState('');
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [activeTab, setActiveTab] = useState('home');

        const [transactions, setTransactions] = useState([]);
        const [accounts, setAccounts] = useState([]);
        const [categories, setCategories] = useState(DEFAULT_CATS);
        const [recurring, setRecurring] = useState([]);
        const [retirement, setRetirement] = useState({ currentAge:30, retireAge:60, monthlyExpense:30000, inflation:2 });
        const [exchangeRates, setExchangeRates] = useState(DEFAULT_RATES);
        const [monthlyBudget, setMonthlyBudget] = useState(30000);
        const [books, setBooks] = useState([]);
        const [currentBook, setCurrentBook] = useState({ id:'main', name:'日常帳本', currency:'TWD' });

        const [currentLedgerMonth, setCurrentLedgerMonth] = useState(getLocalMonth());
        const [analysisMode, setAnalysisMode] = useState('month'); 
        const [analysisType, setAnalysisType] = useState('expense');
        const [expandedCategory, setExpandedCategory] = useState(null); 
        const [expandedSubCategory, setExpandedSubCategory] = useState(null);
        
        const [modal, setModal] = useState(null); 
        const [editTarget, setEditTarget] = useState(null);
        const [selectedCategory, setSelectedCategory] = useState(null); 
        
        const [txForm, setTxForm] = useState({ type:'expense', amount:'', toAmount:'', category:'', subCategory:'', accountId:'', toAccountId:'', debtor:'', date:getLocalToday(), note:'', currency:'TWD' });
        const [editingTx, setEditingTx] = useState(null);
        const [accForm, setAccForm] = useState({ name:'', type:'cash', currency:'TWD', initialBalance:'', includeInTotal: true, isArchived: false });
        const [showArchived, setShowArchived] = useState(false); // 控制停用區塊是否折疊        const [recForm, setRecForm] = useState({ name:'', type:'expense', amount:'', day:1 });
        const [newCatForm, setNewCatForm] = useState({ name:'', icon:'tag', type:'expense' });
        const [retireForm, setRetireForm] = useState({});
        
        const [isAdvanceSplit, setIsAdvanceSplit] = useState(false);
        const [splitData, setSplitData] = useState({ advances:[{debtor:'',amount:''}], principalAmount:'', sourceAccountId:'' });
        const [installment, setInstallment] = useState({ enabled:false, periods:3 });
        const [settleToAccount, setSettleToAccount] = useState('');
        const [newMarketValue, setNewMarketValue] = useState('');
        const [holdingForm, setHoldingForm] = useState([]);
        const [editingCategoryType, setEditingCategoryType] = useState('expense');
        const [editingCategory, setEditingCategory] = useState(null);
        const [settleTargetTx, setSettleTargetTx] = useState(null);
        const [isOffset, setIsOffset] = useState(false);
        const [offsetTargetId, setOffsetTargetId] = useState('');
        const [viewingAccount, setViewingAccount] = useState(null);
        const [accountDetailMonth, setAccountDetailMonth] = useState(getLocalMonth());
        
        const [isImporting, setIsImporting] = useState(false);
        const fileInputRef = useRef(null);

        const fbRef = useRef(null);
        const authRef = useRef(null);
        const dbRef = useRef(null);
        const appId = 'my-cloud-ledger-pro';

        const dragItem = useRef(null);
        const dragOverItem = useRef(null);

        useEffect(() => {
            const init = () => {
                if (window.isFirebaseSDKReady) {
                    try {
                        let cfg = window.EMBEDDED_CONFIG;
                        if (!cfg) {
                            cfg = window.__firebase_config ? JSON.parse(window.__firebase_config) : JSON.parse(localStorage.getItem('my_ledger_firebase_config'));
                        }

                        if (cfg) {
                            const app = window.FirebaseSDK.initializeApp(cfg);
                            fbRef.current = window.FirebaseSDK;
                            authRef.current = window.FirebaseSDK.getAuth(app);
                            dbRef.current = window.FirebaseSDK.getFirestore(app);
                            setSdkReady(true);
                        } else { setNeedConfig(true); setLoading(false); }
                    } catch (e) { setNeedConfig(true); setLoading(false); }
                } else setTimeout(init, 100);
            };
            init();
        }, []);

        const handleSaveConfig = () => {
            try {
                let v = configInput.trim().replace(/([{,]\s*)([a-zA-Z0-9_]+)\s*:/g, '$1"$2":').replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
                if(v.includes("const")) v = v.substring(v.indexOf('{'), v.lastIndexOf('}')+1);
                const c = JSON.parse(v);
                if(!c.apiKey) throw new Error("缺少 apiKey");
                localStorage.setItem('my_ledger_firebase_config', JSON.stringify(c));
                window.location.reload();
            } catch(e) { setError({ title:"設定無效", message:e.message }); }
        };

        const resetApp = () => { localStorage.removeItem('my_ledger_firebase_config'); window.location.reload(); };

        useEffect(() => {
            const timer = setTimeout(() => { if (loading && !needConfig) { setLoading(false); setError({ title: "連線逾時", message: "系統連線過久，可能是：\n1. 未開啟「匿名登入」。\n2. 網域未授權。\n3. API Key 錯誤。" }); } }, 15000); 
            return () => clearTimeout(timer);
        }, [loading, needConfig]);

        useEffect(() => {
            if (!sdkReady) return;
            const unsubAuth = fbRef.current.onAuthStateChanged(authRef.current, async (u) => {
                if (u) setUser(u);
                else {
                    try { await fbRef.current.signInAnonymously(authRef.current); }
                    catch (e) { setError({ title:"登入失敗", message: "請開啟匿名登入或檢查網域授權" }); setLoading(false); }
                }
            });
            return () => unsubAuth();
        }, [sdkReady]);

        const handleGoogleLogin = async () => { try { await fbRef.current.signInWithPopup(authRef.current, new fbRef.current.GoogleAuthProvider()); } catch(e) { setError({title:"登入錯誤", message:e.message}); } };

        useEffect(() => {
            if (!user || !sdkReady) return;
            const userRef = fbRef.current.doc(dbRef.current, 'artifacts', appId, 'users', user.uid);
            
            const checkAutoPay = async (accs) => {
                const m = getLocalMonth();
                const cards = accs.filter(a => a.type==='credit' && a.autoPayment && a.autoPaymentAccount);
                if (cards.length === 0) return;
                const batch = fbRef.current.writeBatch(dbRef.current);
                let hasUpd = false;
                cards.forEach(c => {
                    if (c.lastAutoPaymentMonth !== m && new Date().getDate() >= parseInt(c.paymentDueDay||15)) {
                        batch.set(fbRef.current.doc(fbRef.current.collection(userRef, 'transactions')), {
                            type: 'transfer', amount: 0, category: '自動繳款', accountId: c.autoPaymentAccount, toAccountId: c.id, date: getLocalToday(), bookId: 'main', note: `[系統] 卡費 (${c.name})`, createdAt: new Date().toISOString()
                        });
                        batch.update(fbRef.current.doc(userRef, 'accounts', c.id), { lastAutoPaymentMonth: m });
                        hasUpd = true;
                    }
                });
                if (hasUpd) await batch.commit();
            };

            const checkRecurring = async (recs) => {
                const m = getLocalMonth();
                const d = new Date().getDate();
                const batch = fbRef.current.writeBatch(dbRef.current);
                let hasUpd = false;
                
                recs.forEach(r => {
                    if (d >= r.day && r.lastCreatedMonth !== m) {
                        const newTx = {
                            type: r.type,
                            amount: r.amount,
                            accountId: r.accountId || '',
                            toAccountId: r.toAccountId || '',
                            category: r.category || '固定收支',
                            date: getLocalToday(),
                            note: `[固定] ${r.name}`,
                            bookId: 'main',
                            createdAt: new Date().toISOString()
                        };
                        batch.set(fbRef.current.doc(fbRef.current.collection(userRef, 'transactions')), newTx);
                        batch.update(fbRef.current.doc(userRef, 'recurring', r.id), { lastCreatedMonth: m });
                        hasUpd = true;
                    }
                });
                if(hasUpd) await batch.commit();
            };

            const unsubs = [
            fbRef.current.onSnapshot(fbRef.current.collection(userRef, 'transactions'), s => {
                const docs = s.docs.map(d => ({id: d.id, ...d.data()}));
                docs.sort((a, b) => {
                    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
                    return (a.createdAt || '') < (b.createdAt || '') ? 1 : -1;
                });
                setTransactions(docs);
            }),
                fbRef.current.onSnapshot(fbRef.current.collection(userRef, 'accounts'), s => { 
                    const a = s.docs.map(d=>({id:d.id,...d.data()})).sort((a, b) => (a.order || 0) - (b.order || 0)); 
                    setAccounts(a); 
                    checkAutoPay(a); 
                }),
                fbRef.current.onSnapshot(fbRef.current.doc(userRef, 'settings', 'config'), d => { 
                    if(d.exists()) { 
                        const data = d.data();
                        if (data.categories) setCategories(data.categories); 
                        if (data.budget) setMonthlyBudget(data.budget); 
                    } else fbRef.current.setDoc(fbRef.current.doc(userRef, 'settings', 'config'), { categories: DEFAULT_CATS }, {merge: true}); 
                }),
                fbRef.current.onSnapshot(fbRef.current.doc(userRef, 'settings', 'rates'), d => { if(d.exists()) setExchangeRates(d.data()); else fbRef.current.setDoc(fbRef.current.doc(userRef, 'settings', 'rates'), DEFAULT_RATES, {merge: true}); }),
                fbRef.current.onSnapshot(fbRef.current.doc(userRef, 'settings', 'retirement'), d => { if(d.exists()) setRetirement(d.data()); else fbRef.current.setDoc(fbRef.current.doc(userRef, 'settings', 'retirement'), retirement, {merge: true}); }),
                
                fbRef.current.onSnapshot(fbRef.current.collection(userRef, 'recurring'), s => {
                    const r = s.docs.map(d=>({id:d.id,...d.data()}));
                    setRecurring(r);
                    checkRecurring(r);
                }),
                
                fbRef.current.onSnapshot(fbRef.current.collection(userRef, 'books'), s => setBooks([{id:'main',name:'日常帳本',currency:'TWD'},...s.docs.map(d=>({id:d.id,...d.data()}))]))
            ];
            setLoading(false);
            return () => unsubs.forEach(u => u());
        }, [user, sdkReady]);
        // --- 新增：背景自動抓取台銀匯率 ---
        useEffect(() => {
            if (!user || !sdkReady) return;
            const autoFetchRates = async () => {
                try {
                    // 呼叫你的 GAS 爬蟲 API
                    const res = await fetch('https://script.google.com/macros/s/AKfycbxWOtO6F00m_OAu0zc1hzQn4F2BieA1ZXAF7Bv_8i5L5KfeN9kV07C_6JFH9DuJ_M4/exec');
                    const data = await res.json();
                    
                    if (!data.error) {
                        const newRates = { ...exchangeRates };
                        let hasUpdate = false;
                        
                        // 將抓到的匯率與現有支援的幣別比對
                        CURRENCIES.forEach(c => {
                            if (data[c] && data[c] !== newRates[c]) {
                                newRates[c] = data[c];
                                hasUpdate = true;
                            }
                        });
                        
                        // 如果有更新，就寫入 Firebase 儲存
                        if (hasUpdate) {
                            setExchangeRates(newRates);
                            fbRef.current.setDoc(fbRef.current.doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'settings', 'rates'), newRates, {merge: true});
                        }
                    }
                } catch(e) { 
                    console.log("自動更新匯率失敗，使用舊有匯率", e); 
                }
            };
            
            autoFetchRates();
        }, [user, sdkReady]); // 每次登入或重整網頁時觸發一次
			
        const saveData = async (col, data, id=null) => {
            const ref = fbRef.current.doc(dbRef.current, 'artifacts', appId, 'users', user.uid);
            if (id) await fbRef.current.updateDoc(fbRef.current.doc(ref, col, id), data);
            else await fbRef.current.addDoc(fbRef.current.collection(ref, col), { ...data, createdAt: new Date().toISOString() });
        };
        const deleteData = async (col, id) => { await fbRef.current.deleteDoc(fbRef.current.doc(dbRef.current, 'artifacts', appId, 'users', user.uid, col, id)); };

        const getCategoryIcon = (catName, type) => {
            if(type === 'transfer') return 'arrow-right-left';
            if(type === 'advance') return 'hand-coins';
            if(type === 'repayment') return 'check-circle';
            if(type === 'transfer_in') return 'arrow-left-right'; 
            if(type === 'transfer_out') return 'arrow-right-left';
            if (!categories[type] && type!=='expense' && type!=='income') return 'tag';
            if (!categories[type]) return 'tag';
            const cat = categories[type].find(c => c.name === catName);
            return cat ? cat.icon : 'tag';
        };
        
        const getRemainingDebt = (txId) => {
            const adv = stats.advanceMap[txId];
            return adv ? adv.remaining : 0;
        };

        const handleSettle = async () => {
            if (!settleTargetTx) return;
            const batch = fbRef.current.writeBatch(dbRef.current);
            const userRef = fbRef.current.doc(dbRef.current, 'artifacts', appId, 'users', user.uid);
            
            const repayAmount = parseFloat(settleTargetTx.amount); 

            batch.set(fbRef.current.doc(fbRef.current.collection(userRef, 'transactions')), {
                type: 'repayment',
                amount: repayAmount,
                category: '還款',
                accountId: settleToAccount || accounts[0]?.id,
                relatedTxId: settleTargetTx.id,
                bookId: currentBook.id,
                date: getLocalToday(),
                note: `收回代墊: ${settleTargetTx.debtor}`,
                createdAt: new Date().toISOString()
            });

ton onClick={()=>setEditingCategoryType('income')} className={`flex-1 py-2 rounded ${editingCategoryType==='income'?'bg-rose-500 text-white':'bg-stone-100 text-stone-500'}`}>收入</button></div><div className="space-y-2">{categories[editingCategoryType].map(c=>(<div key={c.name} className="flex justify-between p-3 bg-stone-50 rounded-lg cursor-pointer hover:bg-stone-100" onClick={()=>{setEditingCategory(c); setModal('editCat')}}><span><Icon name={c.icon} size={14} className="inline mr-2"/>{c.name}</span><span className="text-xs text-stone-400">{c.subs.length} 子類別 ></span></div>))}</div><div className="mt-4 pt-4 border-t flex gap-2"><input id="newCatName" placeholder="新類別名稱" className="flex-1 p-2 border rounded" value={newCatForm.name} onChange={e=>setNewCatForm({...newCatForm, name:e.target.value, type:editingCategoryType})}/><button onClick={handleAddCategory} className="bg-blue-600 text-white px-4 rounded">新增</button></div><button onClick={()=>setModal(null)} className="w-full mt-4 text-stone-400">關閉</button></div></div>)}
                    {modal === 'editCat' && editingCategory && (<div className="fixed inset-0 z-[210] bg-black/50 flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm p-6 rounded-2xl"><div className="flex items-center gap-2 mb-4"><Icon name={editingCategory.icon} size={24} className="text-rose-500"/><input className="font-bold text-xl bg-transparent border-b border-stone-300 focus:border-rose-500 outline-none w-full py-1" value={editingCategory.name} onChange={(e) => handleEditMainCategoryName(e.target.value)}/></div><div className="mb-4 h-24 overflow-y-auto grid grid-cols-6 gap-2 p-2 bg-stone-50 rounded border border-stone-100">{AVAILABLE_ICONS.map(icon => (<button key={icon} onClick={() => handleEditMainCategoryIcon(icon)} className={`p-2 rounded hover:bg-stone-200 transition-colors ${editingCategory.icon === icon ? 'bg-rose-100 text-rose-500' : 'text-stone-400'}`}><Icon name={icon} size={18}/></button>))}</div><div className="flex flex-wrap gap-2 mb-4 max-h-32 overflow-y-auto">{editingCategory.subs.map(s => (<span key={s} className="bg-stone-100 px-3 py-1 rounded-full text-sm flex items-center gap-1 text-stone-600 border border-stone-200">{s} <button onClick={() => handleDeleteSubCategory(editingCategory.name, s)} className="text-stone-400 hover:text-red-500 w-4 h-4 flex items-center justify-center rounded-full hover:bg-red-50"><Icon name="x" size={12}/></button></span>))}</div><div className="flex gap-2 mb-6"><input id="newSubCat" className="flex-1 border border-stone-200 p-2 rounded-lg text-sm outline-none focus:border-rose-500 transition-colors" placeholder="新增子類別" /><button onClick={() => { const input = document.getElementById('newSubCat'); handleAddSubCategory(editingCategory.name, input.value); input.value = ''; input.focus(); }} className="bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-rose-600 active:scale-95 transition-all">新增</button></div><div className="pt-4 border-t border-stone-100 flex flex-col gap-3"><button onClick={() => { handleDeleteCategory(editingCategory.name); setModal('cat'); }} className="w-full text-red-400 text-xs py-2 hover:bg-red-50 rounded-lg flex items-center justify-center gap-1 transition-colors"><Icon name="trash-2" size={14} /> 刪除此主類別</button><div className="flex gap-3"><button onClick={() => setModal('cat')} className="flex-1 py-3 rounded-xl bg-stone-100 text-stone-500 font-bold hover:bg-stone-200 transition-colors">取消</button><button onClick={handleSaveCategoryChanges} className="flex-1 py-3 rounded-xl bg-stone-800 text-white font-bold shadow-lg hover:bg-stone-900 transition-transform active:scale-95">確定儲存</button></div></div></div></div>)}
                    {modal === 'rate' && (
                        <div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm p-6 rounded-2xl max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-xl text-stone-800">匯率設定</h3>
                                    {/* 加上自動抓取按鈕 */}
                                    <button 
                                        onClick={async (e) => {
                                            const btn = e.currentTarget;
                                            const originalText = btn.innerHTML;
                                            btn.innerHTML = '<span class="animate-pulse">抓取中...</span>';
                                            btn.disabled = true;
                                            try {
                                                // 呼叫你的 GAS 測試版 API
                                                const res = await fetch('https://script.google.com/macros/s/AKfycbxLhIsN_32Zelwr34NZm7VRg8gumusDji2R5qpzZ-MvP-n55QSzItQdiM016d6z8SI/exec');
                                                const data = await res.json();
                                                if (data.error) throw new Error(data.error);
                                                
                                                // 更新前端 State，保留原本有的幣別
                                                const newRates = { ...exchangeRates };
                                                CURRENCIES.forEach(c => {
                                                    if (data[c]) newRates[c] = data[c];
                                                });
                                                setExchangeRates(newRates);
                                                alert("✅ 成功從台灣銀行更新即時匯率！");
                                            } catch (err) {
                                                alert("❌ 匯率更新失敗，請檢查網路或 API 設定。");
                                            } finally {
                                                btn.innerHTML = originalText;
                                                btn.disabled = false;
                                            }
                                        }}
                                        className="text-xs bg-stone-100 text-stone-600 font-bold px-3 py-1.5 rounded-lg hover:bg-rose-50 hover:text-rose-600 transition-colors"
                                    >
                                        <Icon name="refresh-cw" size={12} className="inline mr-1 -mt-0.5"/>
                                        台銀即時匯率
                                    </button>
                                </div>
                                
                                <p className="text-xs text-stone-400 mb-4">設定 1 外幣 = 多少 TWD</p>
                                
                                <div className="space-y-2">
                                    {CURRENCIES.filter(c => c !== 'TWD').map(c => (
                                        <div key={c} className="flex justify-between items-center">
                                            <span className="font-bold w-12 text-stone-600">{c}</span>
                                            <input 
                                                type="number" 
                                                className="border p-2 rounded w-32 text-right tabular-nums bg-stone-50" 
                                                value={exchangeRates[c] || ''} 
                                                onChange={e => setExchangeRates({...exchangeRates, [c]: parseFloat(e.target.value)})}
                                            />
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="flex gap-2 mt-6">
                                    <button onClick={() => setModal(null)} className="flex-1 py-3 rounded-xl bg-stone-100 text-stone-500 font-bold">取消</button>
                                    <button onClick={handleRatesSubmit} className="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-rose-200">儲存設定</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* --- 修改開始：升級版市值更新視窗 (支援持倉明細) --- */}
                    {modal === 'market' && editTarget && (
                        <div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md p-6 rounded-2xl max-h-[90vh] overflow-y-auto flex flex-col">
                                <h3 className="font-bold text-xl mb-1 text-stone-800">更新市值</h3>
                                <p className="text-sm text-stone-500 mb-6">{editTarget.name} ({editTarget.currency})</p>
                                
                                {/* 總市值顯示 (自動計算) */}
                                <div className="mb-6 bg-stone-50 p-4 rounded-xl text-center border border-stone-100">
                                    <p className="text-xs text-stone-400 font-bold uppercase mb-1">當前總市值</p>
                                    <div className="text-3xl font-black text-stone-800 tabular-nums">
                                        {/* 如果有持倉，顯示計算結果；否則顯示手輸結果 */}
                                        {holdingForm.length > 0 
                                            ? safeNum(holdingForm.reduce((s, h) => s + ((parseFloat(h.qty)||0) * (parseFloat(h.price)||0)), 0))
                                            : (newMarketValue ? safeNum(newMarketValue) : '0')
                                        }
                                    </div>
                                </div>

                                {/* 持倉編輯區 */}
                                <div className="flex-1 overflow-y-auto min-h-0 mb-4">
                                    <div className="space-y-3">
                                        {holdingForm.map((h, idx) => (
                                            <div key={idx} className="flex gap-2 items-center animate-in slide-in-from-bottom-2">
                                                <input 
                                                    placeholder="代號 (如 AAPL)" 
                                                    className="w-1/3 p-2 bg-stone-50 border rounded-lg text-sm font-bold uppercase"
                                                    value={h.symbol}
                                                    onChange={e => {
                                                        const newArr = [...holdingForm];
                                                        newArr[idx].symbol = e.target.value;
                                                        setHoldingForm(newArr);
                                                    }}
                                                />
                                                <input 
                                                    type="number" placeholder="股數" 
                                                    className="w-1/4 p-2 bg-stone-50 border rounded-lg text-sm tabular-nums"
                                                    value={h.qty}
                                                    onChange={e => {
                                                        const newArr = [...holdingForm];
                                                        newArr[idx].qty = e.target.value;
                                                        setHoldingForm(newArr);
                                                    }}
                                                />
                                                <input 
                                                    type="number" step="0.01" placeholder="現價" 
                                                    className="flex-1 p-2 bg-stone-50 border rounded-lg text-sm font-bold text-stone-800 tabular-nums"
                                                    value={h.price}
                                                    onChange={e => {
                                                        const newArr = [...holdingForm];
                                                        newArr[idx].price = e.target.value;
                                                        setHoldingForm(newArr);
                                                    }}
                                                />
                                                <button 
                                                    onClick={() => setHoldingForm(holdingForm.filter((_, i) => i !== idx))}
                                                    className="text-stone-300 hover:text-red-500 p-1"
                                                >
                                                    <Icon name="x" size={18}/>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {/* 按鈕列 */}
                                    <div className="mt-4 flex gap-2">
                                        <button 
                                            onClick={() => setHoldingForm([...holdingForm, { symbol: '', qty: '', price: '' }])}
                                            className="text-xs font-bold text-stone-500 bg-stone-100 px-3 py-2 rounded-lg hover:bg-stone-200 flex items-center gap-1"
                                        >
                                            <Icon name="plus" size={14}/> 新增持倉
                                        </button>
                                        
                                        {/* 如果不想用持倉功能，提供一個「清空」按鈕切換回手輸模式 */}
                                        {holdingForm.length > 0 && (
                                            <button 
                                                onClick={() => { if(confirm('確定要清空持倉改為手輸總額嗎？')) setHoldingForm([]); }}
                                                className="text-xs font-bold text-red-400 bg-red-50 px-3 py-2 rounded-lg hover:bg-red-100 ml-auto"
                                            >
                                                清空持倉
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* 手輸模式 (當沒有持倉時顯示) */}
                                {holdingForm.length === 0 && (
                                    <div className="mb-4 animate-in fade-in">
                                        <label className="text-xs text-stone-400 font-bold mb-1 block">或直接輸入總市值：</label>
                                        <input 
                                            type="number" step="0.01" autoFocus 
                                            className="w-full p-3 bg-stone-50 rounded-xl font-bold border border-stone-200 outline-none focus:border-stone-400 tabular-nums" 
                                            value={newMarketValue} 
                                            onChange={e => setNewMarketValue(e.target.value)} 
                                            placeholder="例如: 10000" 
                                        />
                                    </div>
                                )}

                                <div className="flex gap-3 pt-2 border-t border-stone-100">
                                    <button onClick={()=>setModal(null)} className="flex-1 py-3 rounded-xl bg-stone-100 text-stone-500 font-bold">取消</button>
                                    <button onClick={handleUpdateMarketValue} className="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-rose-200">
                                        更新
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* --- 修改結束 --- */}
                    {modal === 'settle' && settleTargetTx && (<div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm p-6 rounded-2xl"><h3 className="font-bold text-xl mb-2 text-stone-800">收回代墊</h3><p className="text-stone-500 mb-4">對象: {settleTargetTx.debtor} / 金額: ${settleTargetTx.amount.toLocaleString()}</p><select className="w-full p-3 border rounded-lg mb-4" value={settleToAccount} onChange={e=>setSettleToAccount(e.target.value)}><option value="">存入帳戶</option>{accounts.filter(a => !a.isArchived).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select><button onClick={handleSettle} className="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-lg">確認收款</button><button onClick={()=>setModal(null)} className="w-full mt-2 text-stone-400">取消</button></div></div>)}                    {error && (<div className="fixed inset-0 z-[300] bg-black/50 flex items-center justify-center p-6"><div className="bg-white p-6 rounded-2xl max-w-xs w-full shadow-2xl"><h3 className="font-bold text-lg text-rose-500 mb-2">{error.title}</h3><p className="text-sm text-stone-600 mb-4 whitespace-pre-wrap">{error.message}</p><button onClick={()=>setError(null)} className="w-full bg-stone-800 text-white py-2 rounded-lg">OK</button></div></div>)}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
