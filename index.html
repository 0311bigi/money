    <script>
        (function() {
            // 設定你的圖片路徑
            var iconUrl = 'money.png'; 

            // 動態生成 Manifest (全螢幕關鍵)
            var manifest = {
                "name": "退休計劃",
                "short_name": "退休計劃",
                "start_url": ".",
                "display": "standalone", // 這一行讓它變成全螢幕 APP
                "background_color": "#F8FAFC",
                "theme_color": "#F8FAFC",
                "orientation": "portrait",
                "icons": [{
                    "src": iconUrl,
                    "sizes": "192x192 512x512", // 宣告這張圖適用於各種尺寸
                    "type": "image/png"
                }]
            };
            
            // 將 Manifest 物件轉為 Blob URL 放入 href
            var stringManifest = JSON.stringify(manifest);
            var blob = new Blob([stringManifest], {type: 'application/json'});
            var manifestURL = URL.createObjectURL(blob);
            document.getElementById('my-manifest').setAttribute('href', manifestURL);
        })();
    </script>
